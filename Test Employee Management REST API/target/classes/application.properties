spring.application.name=Test Employee Management REST API

# ---- MySQL Datasource ----
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/test_employee_management_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---- Server ----
server.port=8080

# ---- Validation error message format ----
server.error.include-message=always
